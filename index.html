<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <iframe width="640" height="360" src="https://www.youtube.com/embed/Cehdu3r4Ees?si=Dh2sWyykSjrna05i"
    title="YouTube video player" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"></iframe>

  <iframe width="640" height="360" src="https://www.youtube.com/embed/IUKO8fTjn_4?si=tG4pk8OlWdRaLb23"
    title="YouTube video player" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"></iframe>

  <div style="margin-top: 16px;">
    <button id="micBtn">マイク開始</button>
    <span id="micStatus" style="margin-left: 12px; color: gray;">停止中</span>
  </div>
  <canvas id="spectrogram" width="640" height="360"
    style="display:block; margin-top:8px; background:#000; border:1px solid #444;"></canvas>

  <script>
    const canvas = document.getElementById('spectrogram');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('micBtn');
    const status = document.getElementById('micStatus');
    const W = canvas.width, H = canvas.height;
    
    let audioCtx = null;
    let analyser = null;
    let source = null;
    let stream = null;
    let animId = null;
    let starting = false; // getUserMedia待ち中の二重起動防止フラグ

    function draw() {
      animId = requestAnimationFrame(draw);
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
    
      ctx.drawImage(canvas, -1, 0); // 1px左にスクロール
    
      for (let i = 0; i < H; i++) {
        const v = data[Math.floor((H - 1 - i) / H * data.length)];
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(W - 1, i, 1, 1);
      }
    }
  
    function setUIState(recording) {
      btn.textContent = recording ? 'マイク停止' : 'マイク開始';
      status.textContent = recording ? '録音中...' : '停止中';
      status.style.color = recording ? 'red' : 'gray';
    }

    function isRecording() {
      return audioCtx !== null && audioCtx.state === 'running';
    }

    async function startMic() {
      if (starting || isRecording()) return;
      starting = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            autoGainControl: false,
            noiseSuppression: false,
            sampleRate: 48000,
          },
          video:false,
        });
      } catch (error) {
        starting = false;
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          alert('マイクのアクセスが拒否されました。ブラウザの設定でマイクへのアクセスを許可してください。');
        } else {
          alert('マイクのアクセスに失敗しました: ' + error.message);
        }
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);

      draw();
      setUIState(true);
      starting = false;
    }

    function stopMic() {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      if (source) { source.disconnect(); source = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      
      setUIState(false);
    }

    btn.addEventListener('click', () => {
      if (isRecording()) {
        stopMic();
      } else {
        startMic();
      }
    });
  </script>

</body>

</html>
